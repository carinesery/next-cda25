  deploy-recette:
    runs-on: ubuntu-latest
    needs: [lint, test, build-and-push-docker]
    steps:
      - name: config SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy on recette VM
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            cd recette/next-cda25 &&
            git fetch --all
            git checkout develop
            git pull origin develop &&
            sudo docker compose pull --policy=always &&
            sudo docker compose -f compose.recette.yml down || true &&
            sudo docker compose -f compose.recette.yml up -d
          "
