on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy SSH
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            cd /home/azureuser/recette/next-cda25 &&
            git pull origin develop &&
            npm ci &&
            npm run build &&
            pm2 restart app-recette || pm2 start npm --name app-recette -- start
          "