on: push

jobs: 
  build: 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: npm install
      - run: npm run build

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: cypress-io/github-action@v7.1.9
        with:
            start: npm run start
            wait-on: http://localhost:3000
            browser: chrome



